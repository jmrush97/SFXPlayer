<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, user-scalable=yes" />
    <title id="TitleTab">SFX Player</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="signalr.min.js"></script>
    <script src="webapp.js"></script>
</head>

<body>
<div class="app-container">

    <!-- Title bar -->
    <div class="title-bar">
        <span id="Title">SFX Player</span>
        <span id="playingInfoContent" class="playing-info">
            <span>&#9654; Playing:</span>
            <span>Vol: <strong id="PlayingVolume">-</strong></span>
            <span>Speed: <strong id="PlayingSpeed">-</strong></span>
            <span>Fade: <strong id="PlayingFadeGain">-</strong></span>
        </span>
        <button id="btnThemeToggle" class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle light/dark theme">&#9788;</button>
    </div>

    <!-- Three-column main area -->
    <div class="main-area">

        <!-- LEFT: full cue list -->
        <div class="left-panel">
            <div class="panel-header">Cue List</div>
            <div id="cueListContainer" class="cue-list-container"></div>
        </div>

        <!-- CENTER: display + waveform + progress -->
        <div class="center-panel">
            <div class="prev-cue-bar cue-detail">
                <span id="PrevCueNumber" style="font-weight:bold;"></span>
                <span id="PrevCueDescription"></span>
                <span id="PrevCueFileName" style="color:#aaa;"></span>
            </div>
            <div id="PrevMainText" class="cue-text prev-cue"></div>
            <div class="next-cue-bar cue-detail">
                <span id="CueNumber" style="font-weight:bold;"></span>
                <span id="CueDescription"></span>
                <span id="CueFileName" style="color:#aaa;"></span>
                <span id="CueVolume" style="color:#afa;"></span>
                <span id="CueAutoRunDetail" style="color:#8f8;"></span>
            </div>
            <div id="MainText" class="cue-text current-cue"></div>
            <div id="waveformContainer">
                <canvas id="waveformCanvas"></canvas>
                <div id="waveformPositionLine"></div>
                <div id="waveformZoomBar">
                    <button onclick="waveformZoomOut()" title="Zoom out">&#8722;</button>
                    <span id="waveZoomLabel">1.0x</span>
                    <button onclick="waveformZoomIn()" title="Zoom in">&#43;</button>
                </div>
            </div>
            <div id="fadeGainBar" title="Volume fade level"><div id="fadeGainFill"></div></div>
            <div id="progressContainer">
                <div id="progressBar"></div>
                <div id="progressTime">0:00 / 0:00</div>
            </div>
            <div class="info-row">
                <span id="TrackInfo" class="track-info"></span>
                <span id="CueMode" class="cue-mode parallel">&#9654; Parallel</span>
            </div>
        </div>

        <!-- RIGHT: current cue properties -->
        <div class="right-panel">
            <div class="panel-header">Cue Properties</div>

            <div class="prop-row">
                <label for="volumeSlider">&#128266; Volume</label>
                <input id="volumeSlider" type="range" min="0" max="100" value="50"
                    oninput="webapp.sendCommand('volume:' + this.value)" />
                <span id="CurrentVolume" class="prop-val">50</span>
            </div>

            <div class="prop-row">
                <label for="speedSlider">Speed</label>
                <input id="speedSlider" type="range" min="10" max="800" value="100"
                    oninput="webapp.sendCommand('speed:' + (this.value / 100).toFixed(2))" />
                <span id="CurrentSpeed" class="prop-val">1.00</span>
            </div>

            <div class="prop-group-header">Fade</div>
            <div class="prop-row small">
                <label for="fadeInInput">In (ms):</label>
                <input id="fadeInInput" type="number" min="0" max="300000" step="100" value="0" />
            </div>
            <div class="prop-row small">
                <label for="fadeOutInput">Out (ms):</label>
                <input id="fadeOutInput" type="number" min="0" max="300000" step="100" value="0" />
            </div>
            <div class="prop-row small">
                <label for="fadeCurveSelect">Curve:</label>
                <select id="fadeCurveSelect">
                    <option value="linear">Linear</option>
                    <option value="log">Logarithmic</option>
                </select>
            </div>
            <div class="prop-row small">
                <button onclick="setFade()">Set Fade</button>
                <span id="CueFadeInMs" style="display:none;"></span>
                <span id="CueFadeOutMs" style="display:none;"></span>
                <span id="CueFadeCurve" style="display:none;"></span>
            </div>

            <div class="prop-group-header">Auto-run</div>
            <div class="prop-row small">
                <button onclick="toggleAutoRun()" id="btnAutoRun">Auto-run: OFF</button>
            </div>
            <div class="prop-row small">
                <label>Pause(s):</label>
                <input id="pauseInput" type="number" min="0" max="60" step="0.1" value="0" style="width:44px;" />
                <button onclick="setPause()">Set</button>
            </div>

            <div class="prop-group-header">Output Devices</div>
            <div class="prop-row small">
                <label for="playbackDeviceSelect">&#128266; Output:</label><br/>
                <select id="playbackDeviceSelect" onchange="webapp.sendCommand('device:' + this.value)"></select>
            </div>
            <div class="prop-row small">
                <label for="previewDeviceSelect">&#127911; Preview:</label><br/>
                <select id="previewDeviceSelect" onchange="webapp.sendCommand('previewdevice:' + this.value)"></select>
            </div>

            <div class="prop-group-header">Actions</div>
            <div class="prop-row small">
                <button id="btnStopAll" onclick="webapp.sendCommand('stop')" title="Stop all playing audio">&#9632; Stop All</button>
            </div>
            <div class="prop-row small">
                <button onclick="deleteCue()" style="background:tomato;color:white;">Delete Cue</button>
            </div>
        </div>
    </div>

    <!-- Navigation bar -->
    <div class="nav-bar">
        <button class="nav-btn btn-prev" onclick="webapp.sendCommand('previous')" id="btnPrev">
            <span class="nav-btn-label">Previous</span>
            <span class="nav-btn-track" id="prevTrackRef"></span>
        </button>
        <button class="nav-btn btn-stop" onclick="webapp.sendCommand('stop')">Stop</button>
        <button class="nav-btn btn-pause" id="btnPause" onclick="webapp.sendCommand('togglepause')">
            <span class="nav-btn-label">Pause</span>
            <span class="nav-btn-track" id="pauseTrackRef"></span>
        </button>
        <button class="nav-btn btn-go" id="btnGo" onclick="webapp.sendCommand('play')">
            <span class="nav-btn-label">Go</span>
            <span class="nav-btn-track" id="goTrackRef"></span>
        </button>
        <button class="nav-btn btn-next" onclick="webapp.sendCommand('next')" id="btnNext">
            <span class="nav-btn-label">Next</span>
            <span class="nav-btn-track" id="nextNextTrackRef"></span>
        </button>
    </div>

</div>
</body>
</html>
