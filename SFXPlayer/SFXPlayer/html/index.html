<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="Title">SFX Player</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="webapp.js"></script>
</head>

<body>
    <div class="sfx-container">
        <div id="PrevMainText" class="cue-text prev-cue">Previous Cue</div>
        <div id="MainText" class="cue-text current-cue">Main Cue</div>
        <div class="cue-info">
            <div id="TrackName" class="track-name">Track Name</div>
            <div id="CueMode" class="cue-mode parallel">&#9654; Parallel</div>
        </div>
        <div class="controls">
            <button class="btn btn-prev" onclick="webapp.sendCommand('previous')">&#9664; Prev</button>
            <button class="btn btn-stop" onclick="webapp.sendCommand('stop')">&#9632; Stop</button>
            <button class="btn btn-go" onclick="webapp.sendCommand('play')">Go &#9654;</button>
            <button class="btn btn-next" onclick="webapp.sendCommand('next')">Next &#9654;</button>
        </div>
    </div>
</body>
</html>
